# nginx/nginx.conf

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name 10.10.20.251;

    client_max_body_size 50M;

    # ── Django static files ──
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django media files ──
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # ── Django API ──
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Django Admin ──
    location /admin/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── React Frontend — serve files directly ✅ ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # handles React Router
    }
}