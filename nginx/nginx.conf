upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name cms.moa.gov.et;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cms.moa.gov.et;

    ssl_certificate     /etc/ssl/cms.moa.gov.et/fullchain.pem;
    ssl_certificate_key /etc/ssl/cms.moa.gov.et/privatekey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;                          # ← ADD THIS
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";          # ← ADD THIS
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;                          # ← ADD THIS
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";          # ← ADD THIS
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}