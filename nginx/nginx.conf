# nginx/nginx.conf

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name 10.10.20.251;   # replace with your domain later

    client_max_body_size 50M;   # allow large file uploads (abstracts, papers)

    # ── Django static files — served directly by Nginx (fast) ──
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django media files — uploaded files ──
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # ── Django API ──
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Django Admin ──
    location /admin/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── React Frontend — everything else ──
    location / {
        proxy_pass       http://frontend;
        proxy_set_header Host $host;
        # Required for React Router (client-side routing)
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}