# system-builder/nginx.conf
# This config is INSIDE the frontend container only.
# It serves the React build — NOT the reverse proxy (that's nginx/nginx.conf).

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ✅ Critical for React Router — all routes fall back to index.html
    # Without this, refreshing /conferences/123 gives a 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — they have hashed filenames from Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html — always serve latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}