version: "3.8"

services:

  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-conference_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    networks:
      - backend_net

  # ---------- Backend (Django + Gunicorn) ----------
  backend:
    image: moa-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped

    depends_on:
      - db # ✅ FIXED (no condition)

    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}

      DB_NAME: ${DB_NAME:-conference_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432

      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-True}

      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}

    ports:
      - "8000:8000"

    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py collectstatic --no-input &&
             gunicorn conference_backend.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120"

    networks:
      - backend_net

  # ---------- Frontend ----------
  frontend:
    image: moa-frontend:latest
    build:
      context: ./system-builder
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}

    restart: unless-stopped
    depends_on:
      - backend

    ports:
      - "80:80"

# ---------- Networks ----------
networks:
  backend_net:
    driver: bridge

# ---------- Volumes ----------
volumes:
  postgres_data:
  media_data:
  static_data:

