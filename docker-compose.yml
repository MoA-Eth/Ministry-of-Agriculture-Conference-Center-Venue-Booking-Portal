version: "3.8"

services:
  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------- Backend (Django + Gunicorn) ----------
  backend:
    image: moa-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - |
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn conference_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------- Frontend (React + Nginx) ----------
  frontend:
    image: moa-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cms.moa.gov.et:/etc/ssl/cms.moa.gov.et:ro # ← SSL certs
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro # ← nginx config
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "-k", "https://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ---------- Networks ----------
networks:
  backend_net:
    driver: bridge

# ---------- Volumes ----------
volumes:
  postgres_data:
  media_data:
  static_data:
