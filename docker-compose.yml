# ============================================================
# MoA Conference Portal — Docker Compose (Production)
# Deployed on: 10.10.20.251
# ============================================================
# Jenkins builds images first, then runs:
#   docker compose up -d --no-build
# For local dev with build:
#   docker compose up --build -d
# ============================================================

services:

  # ---------- PostgreSQL Database ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-conference_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    # ✅ FIXED: removed ports — db is only reachable inside Docker network
    #    never expose 5432 publicly on a production server
    networks:
      - backend_net

  # ---------- Django Backend ----------
  backend:
    image: moa-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles # ✅ NEW: share static files with Nginx
    environment:
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-10.10.20.251,localhost}
      - DB_NAME=${DB_NAME:-conference_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - DB_HOST=db
      - DB_PORT=5432
      # ✅ FIXED: don't allow all origins in production
      - CORS_ALLOW_ALL_ORIGINS=False
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://10.10.20.251}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    # ✅ FIXED: removed ports — backend only reachable via Nginx internally
    networks:
      - backend_net
      - proxy_net
    # ✅ NEW: healthcheck so Nginx waits for backend to be truly ready

    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py collectstatic --no-input &&
             gunicorn conference_backend.wsgi:application
             --bind 0.0.0.0:8000
             --workers 1
             --timeout 120
             --access-logfile -
             --error-logfile -"

  # ---------- React Frontend ----------
  frontend:
    image: moa-frontend:latest
    build:
      context: ./system-builder
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    # ✅ FIXED: no ports exposed — Nginx proxies to this internally
    networks:
      - proxy_net

  # ---------- Nginx Reverse Proxy ----------  ✅ NEW SERVICE
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80" # HTTP  — only Nginx is public-facing
      # - "443:443"   # uncomment after adding SSL
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro # serve Django static files directly
      - media_data:/app/media:ro # serve Django media files directly
    networks:
      - proxy_net

# ---------- Networks ----------
networks:
  backend_net:
    # db and backend only — db is never reachable from Nginx or frontend
    driver: bridge
  proxy_net:
    # Nginx, frontend, backend — public-facing layer
    driver: bridge

# ---------- Volumes ----------
volumes:
  postgres_data:
  media_data:
  static_data: # ✅ NEW: Django collectstatic output shared with Nginx
